[[machine]]
id = "subscription"
requirements = [
    "BIND-PROGRESS-001",
    "CLEANUP-RECORD-001",
    "CONCUR-LIN-001",
    "HANDLE-DROP-001",
    "STATE-SUB-001",
    "SUB-DATA-001",
    "SUB-STORAGE-001",
]
visibility = "cross-crate-contract"
transition_contract = "exact"
owner_record = "Servient SubscriptionRecord"
scope = "Owns one engine-assigned SubscriptionId, admitted source and item/byte capacity, the binding start transaction, driver installation, the single public receive cursor, stop ownership, cleanup transfer, and the retained terminal outcome"
driver_contract = "The selected binding returns one HostSubscriptionDriver or fills one caller-owned constrained slot only after start succeeds; the binding never allocates the engine SubscriptionId"
source_contract = "Every SubscriptionItem carries the matching SubscriptionId and exact AffordanceTarget; collection start is rejected before side effects when the selected plan cannot guarantee exact source attribution"
receive_contract = "Only the non-Clone Servient Subscription facade owns the receive lease. Control and status views cannot poll items and never create another receive cursor."
installation_contract = "The driver moves BindingStartOwner -> SubscriptionInstallOwner -> SubscriptionDriverSlot exactly once. Active publication and driver-slot publication are one non-callback boundary."
stop_contract = "Stop, drop, remote terminal, and Servient drain join one generation-checked stop owner. StopStarting owns the unchanged driver plus one complete SubscriptionStopInput containing the exact SubscriptionStopRequest and independent CleanupPhaseContext until start_stop accepts the full input; pre-acceptance rejection returns both unchanged. After acceptance the full input commits to the retained stop cursor before poll_stop progress. Both callbacks receive Context, execute outside engine locks or constrained critical sections, and are never concurrent with poll_item on the same driver."
terminal_contract = "SubscriptionDriverEvent transfers the ProcessTerminal and SubscriptionDriverCleanupDisposition together. Complete moves to Closed even when the retained terminal is Failed. TransferRequired retains the complete HostSubscriptionDriverBox at the source until its CleanupTransferEnvelope is accepted by the executor or pre-reserved manual owner; only that acknowledgement moves to CleanupPending and publishes PendingCleanup. ResidualExternalState moves to Failed after durable recording. A no-driver start failure retains Failed plus Complete in its private record and closes without publishing a facade."
process_terminal_axis = ["Completed", "Cancelled", "TimedOut", "Overflowed", "Domain", "Failed"]
cleanup_state_projection = ["Complete->Closed", "PendingCleanup->CleanupPending", "ResidualExternalState->Failed"]
failed_state_cause = "ResidualExternalState"
terminal_retention = "immutable-after-commit"
retryable_stop_origins = ["Active:stop"]
terminal_stop_origins = ["Active:drop", "CancellingStart:start_ready_late", "Installing:cancel", "Installing:drop", "Installing:install_failure"]
public_state_projection = ["Reserved|Starting|Installing->Starting", "CancellingStart->CancellingStart", "Active->Active", "StopStarting|Stopping|TransferRequired->Stopping", "CleanupPending->CleanupPending", "Closed->Closed", "Failed->Failed", "Released->unobservable"]
stop_intent_contract = "Active:stop stages RetryableExplicit with Cancelled; Active:drop, CancellingStart:start_ready_late, Installing:cancel, and Installing:drop stage Terminal with Cancelled; Installing:install_failure stages Terminal with Failed(error). The candidate commits only after stop acceptance or terminal cleanup disposition. A claimed driver terminal wins and replaces an uncommitted candidate."
drop_contract = "Drop never blocks. It offers the complete driver envelope to already reserved bounded cleanup capacity, publishes PendingCleanup only after acknowledgement, or records ResidualExternalState before releasing the application facade."
resource_contract = "SubscriptionId, subscription slot, collection source count, binding-local storage allowance, engine item/byte accounting, and cleanup capacity are reserved before the binding start call"
collection_source_limit = "collection_subscription_sources_per_subscription_max"
initial = "Reserved"
states = [
    "Reserved",
    "Starting",
    "CancellingStart",
    "Installing",
    "Active",
    "StopStarting",
    "Stopping",
    "TransferRequired",
    "CleanupPending",
    "Closed",
    "Failed",
    "Released",
]
terminal = ["Released"]
required_events = [
    "Reserved:begin_start",
    "Reserved:cancel",
    "Reserved:drop",
    "Starting:start_ready",
    "Starting:start_error",
    "Starting:cancel",
    "Starting:drop",
    "CancellingStart:start_ready_late",
    "CancellingStart:start_error_late",
    "CancellingStart:start_cancel_pending",
    "CancellingStart:start_cancel_complete",
    "CancellingStart:start_cancel_transfer_required",
    "CancellingStart:start_cancel_residual",
    "Installing:install_driver",
    "Installing:cancel",
    "Installing:drop",
    "Installing:install_failure",
    "Active:poll_item",
    "Active:driver_terminal_complete",
    "Active:driver_terminal_transfer_required",
    "Active:driver_terminal_residual",
    "Active:stop",
    "Active:drop",
    "StopStarting:claimed_nonterminal",
    "StopStarting:claimed_terminal_complete",
    "StopStarting:claimed_terminal_transfer_required",
    "StopStarting:claimed_terminal_residual",
    "StopStarting:explicit_start_rejected",
    "StopStarting:implicit_start_invalid",
    "StopStarting:start_pending",
    "StopStarting:start_complete",
    "StopStarting:transfer_required",
    "StopStarting:residual",
    "Stopping:poll_stop_pending",
    "Stopping:stop_complete",
    "Stopping:transfer_required",
    "Stopping:residual",
    "TransferRequired:transfer_accepted",
    "TransferRequired:transfer_rejected_manual_accepted",
    "CleanupPending:cleanup_progress",
    "CleanupPending:cleanup_complete",
    "CleanupPending:residual",
    "Closed:release",
    "Failed:release",
]

[[machine.transition]]
from = "Reserved"
event = "begin_start"
to = "Starting"
owner = "SubscriptionStartOwner"
linearization = "publish the generation-bearing start record only after every declared reservation succeeds"
outcome = "binding-start-owned"
retryability = "not-applicable"

[[machine.transition]]
from = "Reserved"
event = "cancel"
to = "Closed"
owner = "SubscriptionStartOwner"
linearization = "record local cancellation before any binding side effect"
outcome = "Complete"
retryability = "terminal"

[[machine.transition]]
from = "Reserved"
event = "drop"
to = "Closed"
owner = "SubscriptionStartOwner"
linearization = "release unconsumed start reservations before any binding side effect"
outcome = "Complete"
retryability = "terminal"

[[machine.transition]]
from = "Starting"
event = "start_ready"
to = "Installing"
owner = "SubscriptionInstallOwner"
linearization = "move the returned generation-matching driver out of BindingStartOwner"
