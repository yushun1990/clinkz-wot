wake_contract = "start_cancel and poll_cancel register wake interest before rechecking observable progress; zero work invokes no binding code, and Servient supplies cleanup-deadline progress when the transport never wakes"
transfer_contract = "TransferRequired is provisional and source-owned. transfer_committed requires acknowledged capacity for the complete call and unchanged lifetime footprint. Executor rejection returns the complete call to the pre-reserved manual owner."
drop_contract = "Drop records a cause and transfers the complete call to reserved cancellation or cleanup ownership; a live call object is never destroyed until Returned, Cancelled, or durable Residual settlement"
