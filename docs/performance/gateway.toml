os_or_firmware = "linux"
kernel_or_runtime = "6.12.y"
clock_source = "invariant-tsc-monotonic-raw"

[gate_policy]
minimum_metrics_regress_when = "decrease"
maximum_metrics_regress_when = "increase"
integer_zero_budget = "exact"
characterization_requires_explicit_marker = true

[measurement]
latency_start = "immediately-before-engine-operation"
latency_stop = "engine-result-or-terminal-status-published"
include_transport_io = false
include_codec = "workload-specific-and-recorded"
allocation_boundary = "clinkz-wot-engine-excluding-handler-owned-output"
peak_live_bytes_unit = "bytes"
lock_wait_unit = "nanoseconds"

[operation_boundary]
local_sync_interaction = "before public local call -> result returned"
inbound_dispatch_no_transport = "owned request ready -> owned response constructed"
compiled_plan_lookup = "lookup key ready -> generation-safe plan reference acquired"
candidate_selection_32 = "ordered candidates ready -> selection or terminal selection error"
security_selection_64_local_probes = "effective expression ready -> branch selected or terminal selection error"
composed_strict_interaction_1k = "owned input ready -> validated dispatch result returned"
subscription_round_trip_one_subscriber = "before enqueue -> same sample dequeued"
shared_payload_fanout_1024 = "before sequence assignment -> every enqueue or overflow decision committed"
network_erased_metadata = "binding request inputs ready -> erased binding start accepted"
network_poll_metadata = "binding request inputs and caller slot ready -> poll binding start accepted"
lazy_plan_single_flight_32 = "first waiter publishes compile intent -> all waiters observe result or backpressure"
startup_snapshot_isolation_4096_things = "startup registration snapshot ready -> 4096 plan sets capture that immutable snapshot and every post-start registration mutation is rejected"
interaction_accounting_contention_256 = "before admitted interaction accounting -> local counters and reservations committed"
maximum_admitted_td_planning = "source bytes admitted -> private compiled plan complete before publication"
admission_byte_and_structure_scaling = "source bytes admitted -> private admission result or limit error"
handler_storage_replacement_matrix = "before handler registration, replacement, removal, or clear -> slot generation published or every reservation rolled back"
handler_cancellation_reentrancy = "selected handler and input owned -> terminal result delivered or discarded and retained invocation ownership released"
producer_subscription_transaction = "before subscription admission -> the declared matrix cell reaches Active or its retained terminal outcome; teardown and replay cells continue through every response and cleanup acknowledgement plus the declared eviction or stale-replay observation"
compiled_emission_target_lookup = "generation-bearing emission key ready -> immutable compiled publication target slice acquired"
emission_binding_scaling = "fully admitted emission ready -> every selected binding result cell reaches a terminal outcome"
slow_binding_isolation = "one per-binding lane is slow or full under declared offered load -> every unrelated binding reaches its progress checkpoint or the blocked emission fails admission without side effects"
exposure_publication_target_construction = "private exposure plans admitted -> committed generation-bearing publication target index becomes visible"
native_collection_subscription = "root collection plan and reserved SubscriptionId ready -> one binding driver is installed or a terminal start error is retained"
owned_host_cancellation_matrix = "accepted owned host call and declared cancellation cell ready -> the call reaches direct cleanup, acknowledged complete transfer, or durable residual settlement with one retained terminal outcome"
compiled_plan_set_lifecycle = "logical plans, binding compiler snapshot, and reserved plan-set footprint ready -> one immutable plan set is published, pinned, drained, and incrementally reclaimed"
route_guard_readiness_lifecycle = "admitted route plans and complete server registration ready -> every route guard reaches committed serving or an ownership-preserving terminal cleanup disposition"
complete_third_party_registration = "external crate registration bundle ready -> validation either publishes the complete startup snapshot entry or rejects it without partial registration"
bounded_binding_ingress = "route-scoped ingress admission ready -> item and byte saturation decisions are committed while unrelated routes retain bounded progress"

