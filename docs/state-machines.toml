[[machine]]
id = "directory-process"
requirements = ["STATE-DISC-001", "API-DIRECTORY-POLL-001"]
initial = "Created"
states = [
    "Created",
    "Running",
    "Stopping",
    "Completed",
    "Cancelled",
    "TimedOut",
    "Overflowed",
    "Failed",
]
terminal = ["Completed", "Cancelled", "TimedOut", "Overflowed", "Failed"]
required_events = ["Created:cancel", "Created:drop", "Running:cancel", "Running:drop"]

[[machine.transition]]
from = "Created"
event = "start"
to = "Running"
owner = "ThingDiscoveryProcess"
linearization = "first poll or explicit start"
outcome = "running"
retryability = "not-applicable"

[[machine.transition]]
from = "Created"
event = "cancel"
to = "Stopping"
owner = "ThingDiscoveryProcess"
linearization = "retain cancellation ownership before backend start"
outcome = "cleanup-required"
retryability = "join-existing"

[[machine.transition]]
from = "Created"
event = "drop"
to = "Stopping"
owner = "DirectoryCleanupOwner"
linearization = "transfer process ownership"
outcome = "cleanup-required"
retryability = "runtime-owned"

[[machine.transition]]
from = "Running"
event = "cancel"
to = "Stopping"
owner = "ThingDiscoveryProcess"
linearization = "prevent new backend work"
outcome = "cleanup-required"
retryability = "join-existing"

[[machine.transition]]
from = "Running"
event = "drop"
to = "Stopping"
owner = "DirectoryCleanupOwner"
linearization = "prevent new backend work and transfer ownership"
outcome = "cleanup-required"
retryability = "runtime-owned"

[[machine.transition]]
from = "Running"
event = "source_exhausted"
to = "Completed"
owner = "ThingDiscoveryProcess"
linearization = "retain terminal event"
outcome = "Completed"
retryability = "terminal"

[[machine.transition]]
from = "Running"
event = "timeout"
to = "TimedOut"
owner = "ThingDiscoveryProcess"
linearization = "retain timeout terminal event"
outcome = "TimedOut"
retryability = "terminal"

[[machine.transition]]
from = "Running"
event = "overflow"
to = "Overflowed"
owner = "ThingDiscoveryProcess"
linearization = "retain overflow terminal event"
outcome = "Overflowed"
retryability = "terminal"

[[machine.transition]]
from = "Running"
event = "failure"
to = "Failed"
owner = "ThingDiscoveryProcess"
linearization = "retain failed terminal event"
outcome = "Failed"
retryability = "terminal"

[[machine.transition]]
from = "Stopping"
event = "cancel_complete"
to = "Cancelled"
owner = "DirectoryCleanupOwner"
linearization = "backend cancellation reaches terminal"
outcome = "Cancelled"
retryability = "terminal"
