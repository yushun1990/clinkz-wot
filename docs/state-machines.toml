public_state_projection = ["Reserved|Starting|Installing->Starting", "CancellingStart->CancellingStart", "Active->Active", "StopStarting|Stopping->Stopping", "CleanupPending->CleanupPending", "Closed->Closed", "Failed->Failed", "Released->unobservable"]
stop_intent_contract = "Active:stop stages RetryableExplicit with Cancelled; Active:drop, CancellingStart:start_ready_late, Installing:cancel, and Installing:drop stage Terminal with Cancelled; Installing:install_failure stages Terminal with Failed(error). The candidate commits only after stop acceptance or terminal cleanup disposition. A claimed driver terminal wins and replaces an uncommitted candidate."
drop_contract = "Drop never blocks. It transfers the driver and every remaining stop obligation to already reserved bounded cleanup capacity or records ResidualExternalState before releasing the application facade."
resource_contract = "SubscriptionId, subscription slot, collection source count, binding-local storage allowance, engine item/byte accounting, and cleanup capacity are reserved before the binding start call"
collection_source_limit = "collection_subscription_sources_per_subscription_max"
