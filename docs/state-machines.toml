[[machine.transition]]
from = "Stopping"
event = "transfer_required"
to = "TransferRequired"
owner = "SubscriptionStopOwner"
linearization = "retain the driver, stop cursor, and ProcessTerminal after poll_stop returns provisional TransferRequired; no PendingCleanup status is committed"
