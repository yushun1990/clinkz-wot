[[machine.transition]]
from = "Stopping"
event = "residual"
to = "Failed"
owner = "SubscriptionStopOwner"
linearization = "durably record the unmatched external resource, preserve the retained ProcessTerminal unchanged, and release the driver slot"
outcome = "ResidualExternalState"
