[[machine.transition]]
from = "Starting"
event = "cancel"
to = "CancellingStart"
owner = "SubscriptionStartOwner"
linearization = "cancellation wins the start-result handoff boundary"
outcome = "await-start-settlement"
retryability = "join-existing"

[[machine.transition]]
from = "Starting"
event = "drop"
to = "CancellingStart"
owner = "SubscriptionStartOwner"
linearization = "drop wins the start-result handoff boundary and transfers ownership to the runtime"
outcome = "runtime-awaits-start-settlement"
