schema_version = 1
design_revision = "4.8"

[[composition]]
id = "handler-direct-response"
requirements = ["STATE-INFLIGHT-001", "HANDLER-CANCEL-001", "CONCUR-LIN-001"]
participants = [
    "in-flight",
    "handler-sync-execution|handler-async-execution|handler-step-execution",
]
trigger = "handler:Returned:claim_direct_response"
response_claim_policy = "atomic-with-handler-release"
preconditions = [
    "handler-result-sink=DirectResponse",
    "handler-call-generation-matches",
    "in-flight-generation-matches",
]
atomic_transitions = [
    "in-flight:Admitted:complete_direct->Completing",
    "handler:Returned:claim_direct_response->Released",
]
failure_transitions = [
    "handler:Returned:response_closed->LateReturned",
    "handler:LateReturned:discard_direct_result->Released",
]
ownership = "The result moves once from HandlerCallOwner to ResponseCoordinator; the handler call reservation releases independently of response-delivery capacity"

[[composition]]
id = "producer-start-result-transfer"
requirements = ["HANDLER-SUB-001", "HANDLER-CANCEL-001", "CONCUR-LIN-001"]
participants = [
    "handler-sync-execution|handler-async-execution|handler-step-execution",
    "producer-subscription",
]
trigger = "handler:Returned:transfer_start_result"
error_response_policy = "claim-before-failed-or-same-generation-terminal"
preconditions = [
    "handler-result-sink=ProducerAcceptance",
    "handler-call-generation-matches-producer-setup-generation",
    "producer-subscription-state=Accepting",
]
success_transitions = [
    "handler:Returned:transfer_start_result->Released",
    "producer-subscription:Accepting:accepted->Accepted",
]
deliverable_error_transitions = [
    "handler:Returned:transfer_start_result->Released",
    "in-flight:Admitted:complete_producer_start_error->Completing",
    "producer-subscription:Accepting:handler_error->Failed",
]
unavailable_error_transitions = [
    "handler:Returned:transfer_start_result->Released",
    "producer-subscription:Accepting:handler_error_response_unavailable->Failed",
]
error_response_semantics = "The deliverable branch atomically claims the error response before Failed is observable; the unavailable branch requires the same InFlight generation already be Cancelled, Released, or terminal Completing and records that fact as start-response-terminal"
success_in_flight_effect = "none; an Ok acceptance leaves the start response Admitted until installed-and-published"
ownership = "Ok moves the linear SubscriptionAcceptance into ProducerSubscriptionOwner; Err releases setup ownership under the no-obligation-on-error contract"

[[composition]]
id = "producer-late-start-result-transfer"
requirements = ["HANDLER-SUB-001", "HANDLER-CANCEL-001", "CONCUR-LIN-001"]
participants = [
    "handler-sync-execution|handler-async-execution|handler-step-execution",
    "producer-subscription",
]
trigger = "handler:LateReturned:transfer_late_start_result"
late_acceptance_policy = "create-teardown-before-discard"
preconditions = [
    "handler-result-sink=ProducerAcceptance",
    "handler-call-generation-matches-producer-setup-generation",
    "producer-subscription-state=AcceptingCancelled",
]
success_transitions = [
    "handler:LateReturned:transfer_late_start_result->Released",
    "producer-subscription:AcceptingCancelled:accepted_late->RollingBack",
]
error_transitions = [
    "handler:LateReturned:transfer_late_start_result->Released",
    "producer-subscription:AcceptingCancelled:error_late->Closed",
]
ownership = "A late Ok creates the application teardown bit before its response payload is discarded; a late Err creates no obligation"

[[composition]]
id = "producer-setup-abort"
requirements = ["HANDLER-SUB-001", "HANDLER-CANCEL-002", "CONCUR-LIN-001"]
participants = [
    "handler-async-execution|handler-step-execution",
    "producer-subscription",
]
trigger = "incomplete ProducerAcceptance execution terminates after cancellation without a CoreResult"
incomplete_cleanup_policy = "complete-or-transfer-or-residual-before-terminal"
setup_obligation_semantics = "A bounded-step Producer start creates SetupCancellation=Pending when cancellation first requires explicit state cleanup. Each cancel callback changes Pending to Claimed(callback_nonce), Pending return restores Pending, Ready or a no-state late result commits Complete, cleanup transfer commits PendingCleanup, and residual commits Residual. Sync and async starts keep SetupCancellation Absent under their no-external-obligation contracts."
cancel_create_transitions = [
    "handler-step-execution:StartingCancelled:state_ready->Cancelling",
    "producer-subscription:AcceptingCancelled:setup_cancel_created->AcceptingCancelled",
]
cancel_claim_transitions = [
    "handler-step-execution:Cancelling:begin_cancel->CancelPolling",
    "producer-subscription:AcceptingCancelled:setup_cancel_claim->AcceptingCancelled",
]
cancel_pending_transitions = [
    "handler-step-execution:CancelPolling:pending->Cancelling",
    "producer-subscription:AcceptingCancelled:setup_cancel_pending->AcceptingCancelled",
]
clean_async_transitions = [
    "handler-async-execution:Dropping:drop_complete_cancel->Cancelled",
    "handler-async-execution:Dropping:drop_complete_deadline->TimedOut",
    "producer-subscription:AcceptingCancelled:setup_aborted->Closed",
]
clean_step_transitions = [
    "handler-step-execution:CancelPolling:ready_ok_cancel->Cancelled",
    "handler-step-execution:CancelPolling:ready_ok_deadline->TimedOut",
    "producer-subscription:AcceptingCancelled:setup_aborted->Closed",
]
late_step_start_error_transitions = [
    "handler-step-execution:StartingCancelled:start_error_cancel->Cancelled",
    "handler-step-execution:StartingCancelled:start_error_deadline->TimedOut",
    "producer-subscription:AcceptingCancelled:error_late->Closed",
]
failed_step_transitions = [
    "handler-step-execution:CancelPolling:ready_error->CleanupFailed",
    "producer-subscription:AcceptingCancelled:setup_cleanup_failed->Failed",
]
transferred_step_transitions = [
    "handler-step-execution:DrainExhausted:cleanup_transfer->CleanupTransferred",
    "producer-subscription:AcceptingCancelled:setup_cleanup_pending->CleanupPending",
]
residual_step_transitions = [
    "handler-step-execution:DrainExhausted:residual->CleanupFailed",
    "producer-subscription:AcceptingCancelled:setup_residual->Failed",
]
ownership = "Producer remains AcceptingCancelled until the future drop or explicit step cleanup has completed or transferred; no destructor is an unrecorded fallible cleanup owner"

[[composition]]
id = "producer-start-publication"
requirements = ["HANDLER-SUB-001", "STATE-INFLIGHT-001", "CONCUR-LIN-001"]
participants = ["in-flight", "producer-subscription"]
trigger = "guard installation returns a completely owned installed guard"
success_response_claim = "atomic-with-installed-and-published"
preconditions = [
    "producer-subscription-state=Installing",
    "subscription-generation-matches",
    "cancellation-not-requested",
    "deadline-not-elapsed",
    "in-flight-state=Admitted",
]
atomic_transitions = [
    "in-flight:Admitted:complete_producer_start->Completing",
    "producer-subscription:Installing:installed_and_published->Active",
]
failure_transitions = [
    "producer-subscription:Installing:response_claim_failure->RollingBack",
]
ownership = "The installed guard enters ProducerSubscriptionOwner before publication; the accepted response enters ResponseCoordinator in the same non-callback boundary"

[[composition]]
id = "producer-prepublication-failure-response"
requirements = ["HANDLER-SUB-001", "STATE-INFLIGHT-001", "CONCUR-LIN-001"]
participants = ["in-flight", "producer-subscription"]
trigger = "accepted response validation or guard installation fails before Active"
error_response_policy = "claim-before-rollback-or-same-generation-terminal"
deliverable_validation_transitions = [
    "in-flight:Admitted:complete_producer_start_error->Completing",
    "producer-subscription:Accepted:response_invalid->RollingBack",
]
unavailable_validation_transitions = [
    "producer-subscription:Accepted:response_invalid_response_unavailable->RollingBack",
]
deliverable_install_transitions = [
    "in-flight:Admitted:complete_producer_start_error->Completing",
    "producer-subscription:Installing:install_failure->RollingBack",
]
unavailable_install_transitions = [
    "producer-subscription:Installing:install_failure_response_unavailable->RollingBack",
]
atomicity = "The Producer failure transition and deliverable InFlight error claim are one non-callback boundary; unavailable variants require the same InFlight generation already be Cancelled, Released, or terminal Completing"
ownership = "Every partial installed guard remains addressable in ProducerSubscriptionOwner while the error response is delivered or recorded unavailable and rollback attempts the GuardClose and ApplicationTeardown bits; SetupCancellation is already Absent or Complete on this path"

[[composition]]
id = "handler-cancellation-response"
requirements = ["HANDLER-CANCEL-001", "HANDLER-CANCEL-002", "STATE-INFLIGHT-001"]
participants = [
    "in-flight",
    "handler-sync-execution|handler-async-execution|handler-step-execution",
    "producer-subscription when present",
]
trigger = "first Manual, Deadline, Drain, or Drop cause"
first_cause_policy = "immutable"
response_transitions = [
    "in-flight:Admitted:cancellation_error->Completing",
    "in-flight:Admitted:deadline_error->Completing",
    "in-flight:Admitted:cancel_close->Cancelled",
    "in-flight:Admitted:deadline_close->Cancelled",
    "in-flight:Admitted:drain_expired->Cancelled",
    "in-flight:Admitted:drop->Cancelled",
]
handler_effect = "Under the documented lock order, record the same first cause in the handler execution record before any later poll or step is admitted; a running callback keeps its unique lease and becomes late"
producer_effect = "When present, change Reserved, Accepting, Accepted, or Installing through its matching cause transition without taking a running CallbackLease"
producer_teardown_exception = "Cancellation, deadline, or drop of one teardown response view closes and acknowledges only that InFlight view; it never cancels a ProducerTeardown HandlerCallOwner. Only Servient drain, Thing destroy, or an explicit HandlerCleanupOwner abort policy may cancel teardown execution."
race_rule = "A response claim already in Completing wins; later causes join through the Completing self-loop transitions and cannot replace the result or first cause"

[[composition]]
id = "producer-teardown-handoff"
requirements = ["HANDLER-SUB-001", "HANDLER-STORAGE-001", "CONCUR-LIN-001"]
participants = [
    "producer-subscription",
    "handler-sync-execution|handler-async-execution|handler-step-execution",
]
trigger = "producer-subscription:Active:(stop|wire_teardown|drop|destroy|start_response_delivery_failure)->Stopping"
active_pending_call_reservation = "none"
application_teardown_admission = "acquire-count-and-bytes-at-claim"
preconditions = [
    "teardown-entry-generation-matches-reserved-generation",
    "teardown-footprint-individually-fits-profile",
    "ApplicationTeardown=Pending",
]
atomic_handoff = "ProducerSubscriptionOwner transfers teardown responsibility and retained generation metadata without a pending-call reservation; a wire request also attaches its separate InFlight view"
call_admission = "After GuardClose is attempted, claim_next_obligation acquires normal pending-call count and bytes atomically with creation of one ProducerTeardown HandlerCallOwner; saturation leaves ApplicationTeardown Pending and publishes ProducerSubscriptionTeardown pending work"
result_transitions = [
    "handler:Returned:transfer_teardown_result->Released",
    "handler:LateReturned:transfer_late_teardown_result->Released",
]
cleanup_rule = "HandlerCleanupOwner closes GuardClose first, then admits and invokes ApplicationTeardown at most once; cleanup capacity is charged only on actual transfer, and bounded drain exhaustion transfers a charged cleanup owner or records residual before terminal release"

[[composition]]
id = "producer-teardown-result-and-response"
requirements = ["HANDLER-SUB-001", "STATE-INFLIGHT-001", "CONCUR-LIN-001"]
participants = [
    "in-flight when an initiating wire teardown view exists",
    "handler-sync-execution|handler-async-execution|handler-step-execution",
    "producer-subscription",
]
trigger = "ProducerTeardown HandlerCallOwner returns or terminates late"
wire_response_owner = "initiating-view-only"
wire_success_transitions = [
    "handler:Returned:transfer_teardown_result->Released",
    "in-flight:Admitted:complete_direct->Completing",
    "producer-subscription:Stopping|CleanupPending:obligation_complete->same",
]
wire_error_transitions = [
    "handler:Returned:transfer_teardown_result->Released",
    "in-flight:Admitted:complete_direct->Completing",
    "producer-subscription:Stopping|CleanupPending:obligation_error|obligation_residual->same",
]
local_transitions = [
    "handler:Returned:transfer_teardown_result->Released",
    "producer-subscription:RollingBack|Stopping|CleanupPending:obligation_complete|obligation_error|obligation_residual->same",
]
late_transitions = [
    "handler:LateReturned:transfer_late_teardown_result->Released",
    "producer-subscription:RollingBack|Stopping|CleanupPending:obligation_complete|obligation_error|obligation_residual->same",
]
async_no_result_transitions = [
    "handler-async-execution:Dropping:drop_complete_cancel->Cancelled",
    "handler-async-execution:Dropping:drop_complete_deadline->TimedOut",
    "producer-subscription:RollingBack|Stopping|CleanupPending:obligation_residual->same",
]
step_cancel_complete_transitions = [
    "handler-step-execution:CancelPolling:ready_ok_cancel->Cancelled",
    "handler-step-execution:CancelPolling:ready_ok_deadline->TimedOut",
    "producer-subscription:RollingBack|Stopping|CleanupPending:obligation_complete->same",
]
step_cancel_error_transitions = [
    "handler-step-execution:CancelPolling:ready_error->CleanupFailed",
    "producer-subscription:RollingBack|Stopping|CleanupPending:obligation_error->same",
]
step_cancel_transfer_transitions = [
    "handler-step-execution:DrainExhausted:cleanup_transfer->CleanupTransferred",
    "producer-subscription:RollingBack|Stopping|CleanupPending:obligation_pending->same",
]
step_cancel_residual_transitions = [
    "handler-step-execution:DrainExhausted:residual->CleanupFailed",
    "producer-subscription:RollingBack|Stopping|CleanupPending:obligation_residual->same",
]
owner_abort_response_transitions = [
    "in-flight:Admitted:cancellation_error->Completing",
    "in-flight:Admitted:deadline_error->Completing",
    "in-flight:Admitted:drain_expired->Cancelled",
    "in-flight:Admitted:drop->Cancelled",
]
no_result_response_precondition = "Before an owner abort may cancel ProducerTeardown execution, its initiating InFlight view is absent or atomically leaves Admitted through the transition matching the immutable abort cause. A view already Completing, Cancelled, or Released is joined without replacement. Thus a no-CoreResult terminal can never strand an Admitted response opportunity."
no_result_semantics = "An incomplete async teardown conservatively commits ApplicationTeardown=Residual in the reserved Producer record because no CoreResult proves application teardown complete. Step cancel Ready(Ok) commits Complete, Ready(Err) commits Complete with terminal cleanup failure under the no-remaining-obligation contract, cleanup transfer commits PendingCleanup, and drain residual commits Residual. The already claimed cancellation response or closed view terminates and acknowledges independently."
response_unavailable = "For an ordinary on-time result in Stopping or CleanupPending, an Admitted initiating view is claimed with complete_direct; if it is already Completing, Cancelled, or Released, HandlerCleanupOwner settles the obligation and discards the unavailable output without retry. Local and rollback cleanup have no initiating view."
ownership = "Only the initiating wire teardown view receives the validated handler output; joined or later teardown requests receive the retained payload-free terminal summary through their own InFlight views"

[[composition]]
id = "producer-terminal-replay-and-release"
requirements = ["HANDLER-SUB-001", "STATE-INFLIGHT-001", "CONCUR-LIN-001"]
participants = ["producer-subscription", "in-flight"]
trigger = "repeated stop or matched wire teardown after Active"
replay_payload = "status-or-error-summary-only"
release_condition = "all-terminal-preconditions"
join_transitions = [
    "producer-subscription:Stopping:join_stop->Stopping",
    "producer-subscription:Stopping:join_runtime_stop->Stopping",
    "producer-subscription:Stopping:join_wire_teardown->Stopping",
    "producer-subscription:CleanupPending:join_stop->CleanupPending",
    "producer-subscription:CleanupPending:join_runtime_stop->CleanupPending",
    "producer-subscription:CleanupPending:join_wire_teardown->CleanupPending",
    "producer-subscription:Closed:join_runtime_stop->Closed",
    "producer-subscription:Failed:join_runtime_stop->Failed",
]
replay_transitions = [
    "producer-subscription:Closed:replay_wire_teardown->Closed",
    "producer-subscription:Failed:replay_wire_teardown->Failed",
]
local_replay_transitions = [
    "producer-subscription:Closed|Failed:join_stop->same",
]
in_flight_release_transitions = [
    "in-flight:Completing:release->Released",
    "in-flight:Cancelled:release->Released",
]
start_response_ack_transitions = [
    "producer-subscription:AcceptingCancelled|InstallingCancelled|Active|RollingBack|Stopping|CleanupPending|Closed|Failed:start_response_terminal->same",
]
teardown_view_ack_transitions = [
    "producer-subscription:Stopping|CleanupPending|Closed|Failed:teardown_view_terminal->same",
]
local_view_release_transitions = [
    "producer-subscription:Stopping|CleanupPending|Closed|Failed:local_view_released->same",
]
start_response_failure_transitions = [
    "producer-subscription:AcceptingCancelled|InstallingCancelled|RollingBack|Stopping|CleanupPending|Failed:start_response_delivery_failure->same",
    "producer-subscription:Active:start_response_delivery_failure->Stopping",
    "producer-subscription:Closed:start_response_delivery_failure->Failed",
]
release_transitions = [
    "producer-subscription:Closed:release_when_quiescent->Released",
    "producer-subscription:Failed:release_when_quiescent->Released",
]
local_view_accounting = "Active:stop and each nonterminal join_stop attach exactly one generation-checked local view and increment the checked count once. join_runtime_stop for drop or destroy never creates a view. Closed or Failed join_stop returns the retained summary in one boundary with zero net count. Every retained local view decrements once through local_view_released; duplicate and stale releases are no-ops."
ack_atomicity = "InFlight release and the matching generation-checked start-response or teardown-view acknowledgement are one non-callback boundary. A retained local view decrements through local_view_released. Duplicate or stale acknowledgements change no count."
tombstone_eviction_policy = "A quiescent Closed or Failed record remains a bounded tombstone in its existing subscription slot. It is evicted only for Thing destruction or admission pressure from subscription-item or handler-state-byte ceilings. The deterministic victim is the smallest (ThingSlotId, SubscriptionId, subscription generation) tuple among quiescent tombstones eligible for the pressured scope; replay before eviction returns the retained summary and replay after eviction returns StaleHandle."
ownership = "Each wire observer owns a separate bounded InFlight response; Producer stores only checked start/view acknowledgements and a payload-free summary. Quiescence makes a tombstone evictable but does not itself release it; release_when_quiescent performs deterministic eviction after every declared terminal precondition holds."

[[machine]]
id = "expose"
requirements = ["STATE-EXPOSE-001", "HANDLE-DROP-001", "LIFE-EXPOSE-003"]
initial = "Draft"
states = [
    "Draft",
    "Preparing",
    "ReadyPendingActivation",
    "Activating",
    "Committing",
    "Serving",
    "Cancelling",
    "Draining",
    "CleanupPending",
    "Cancelled",
    "Destroyed",
    "Failed",
]
terminal = ["Cancelled", "Destroyed", "Failed"]
required_events = [
    "Preparing:cancel",
    "Preparing:drop",
    "Preparing:destroy",
    "ReadyPendingActivation:cancel",
    "ReadyPendingActivation:drop",
    "ReadyPendingActivation:destroy",
    "Activating:cancel",
    "Activating:drop",
    "Activating:destroy",
    "Committing:cancel",
    "Committing:drop",
    "Committing:destroy",
    "Serving:drop",
    "Serving:destroy",
]

[[machine.transition]]
from = "Draft"
event = "expose"
to = "Preparing"
owner = "ExposedThingHandle"
linearization = "publish expose transaction ownership"
outcome = "in-progress"
retryability = "same-handle-forbidden-after-transition"

[[machine.transition]]
from = "Draft"
event = "destroy"
to = "Destroyed"
owner = "ExposedThingHandle"
linearization = "release private reservations"
outcome = "Complete"
retryability = "idempotent"

[[machine.transition]]
from = "Draft"
event = "drop"
to = "Destroyed"
owner = "ExposedThingHandle"
linearization = "release private reservations"
outcome = "Complete"
retryability = "idempotent"

[[machine.transition]]
from = "Preparing"
event = "all_routes_prepared"
to = "ReadyPendingActivation"
owner = "Servient"
linearization = "retain every prepared guard"
outcome = "in-progress"
retryability = "not-applicable"

[[machine.transition]]
from = "ReadyPendingActivation"
event = "readiness_complete"
to = "Activating"
owner = "Servient"
linearization = "observe all readiness tokens ready"
