[[machine.transition]]
from = "TransferRequired"
event = "transfer_accepted"
to = "CleanupPending"
owner = "SubscriptionCleanupOwner"
linearization = "atomically move the complete CleanupTransferEnvelope to the acknowledged executor owner and retain its CleanupRecord before publishing PendingCleanup"
