[[machine]]
id = "in-flight"
requirements = ["STATE-INFLIGHT-001"]
visibility = "crate-private"
transition_contract = "exact"
scope = "Owns only response opportunity and in-flight capacity; handler execution lifetime is owned by the handler execution machines"
released_semantics = "Released closes response delivery and capacity ownership but does not imply that user handler code, a future, or step state has terminated"
cancellation_causes = ["Manual", "Deadline", "Drain", "Drop"]
first_cause_semantics = "The first cancellation transition serialized at the in-flight boundary stores one cause; later cancellation observations join it and cannot replace it"
completion_semantics = "complete_direct is reserved for a non-start handler result; complete_producer_start is reserved for the Producer installed-and-published composition; complete_producer_start_error claims an on-time setup Err without publishing Active; cancellation_error claims a deliverable Cancelled response; deadline_error claims a deliverable TimedOut response"
initial = "Vacant"
states = ["Vacant", "Admitted", "Completing", "Cancelled", "Released"]
terminal = ["Released"]
required_events = [
    "Vacant:admit",
    "Admitted:complete_direct",
    "Admitted:complete_producer_start",
    "Admitted:complete_producer_start_error",
    "Admitted:cancellation_error",
    "Admitted:deadline_error",
    "Admitted:cancel_close",
    "Admitted:deadline_close",
    "Admitted:drain_expired",
    "Admitted:drop",
    "Completing:cancel_after_claim",
    "Completing:deadline_after_claim",
    "Completing:drain_after_claim",
    "Completing:drop_after_claim",
    "Completing:release",
    "Cancelled:release",
]

[[machine.transition]]
from = "Vacant"
event = "admit"
to = "Admitted"
owner = "Servient"
linearization = "publish slot after serving generation recheck"
outcome = "in-flight"
retryability = "not-applicable"

[[machine.transition]]
from = "Admitted"
event = "complete_direct"
to = "Completing"
owner = "ResponseCoordinator"
linearization = "atomically claim the response opportunity for one non-start handler result and reject every stale handler-call generation"
outcome = "direct-response-claimed"
retryability = "not-applicable"

[[machine.transition]]
from = "Admitted"
event = "complete_producer_start"
to = "Completing"
owner = "ProducerSubscriptionOwner"
linearization = "atomically claim the start response as part of the Producer installed-and-published composition"
outcome = "producer-start-response-claimed"
retryability = "not-applicable"

[[machine.transition]]
from = "Admitted"
event = "complete_producer_start_error"
to = "Completing"
owner = "ProducerSubscriptionOwner"
linearization = "atomically claim the on-time setup error response without installing or publishing a Producer subscription"
outcome = "producer-start-error-response-claimed"
retryability = "not-applicable"

[[machine.transition]]
from = "Admitted"
event = "cancellation_error"
to = "Completing"
owner = "CancellationOwner"
linearization = "manual cancellation wins the response boundary and claims one deliverable Cancelled error response"
outcome = "cancelled-response-claimed-handler-result-late"
retryability = "not-applicable"

[[machine.transition]]
from = "Admitted"
event = "deadline_error"
to = "Completing"
owner = "CancellationOwner"
linearization = "deadline cancellation wins the response boundary and claims one deliverable TimedOut error response"
outcome = "timed-out-response-claimed-handler-result-late"
retryability = "not-applicable"

[[machine.transition]]
from = "Admitted"
event = "cancel_close"
to = "Cancelled"
owner = "CancellationOwner"
linearization = "manual cancellation closes a response channel that can no longer deliver an error and records Manual as the first cause"
outcome = "response-closed-handler-result-late"
retryability = "join-existing"

[[machine.transition]]
from = "Admitted"
event = "deadline_close"
to = "Cancelled"
owner = "CancellationOwner"
linearization = "deadline closes a response channel that can no longer deliver an error and records Deadline as the first cause"
outcome = "response-closed-handler-result-late"
retryability = "join-existing"

[[machine.transition]]
from = "Admitted"
event = "drain_expired"
to = "Cancelled"
owner = "Servient"
linearization = "response gate closes and records Drain as the first cause"
outcome = "late-results-discarded-handler-execution-owned-separately"
retryability = "not-applicable"

[[machine.transition]]
from = "Admitted"
event = "drop"
to = "Cancelled"
owner = "CancellationOwner"
linearization = "the last response owner drops and closes the response gate with Drop as the first cause"
outcome = "response-owner-dropped-handler-execution-owned-separately"
retryability = "runtime-owned"

[[machine.transition]]
from = "Completing"
event = "cancel_after_claim"
to = "Completing"
owner = "CancellationOwner"
linearization = "the already claimed response wins; cancellation joins response delivery and cannot replace its result"
outcome = "response-claim-won"
retryability = "join-existing"

[[machine.transition]]
from = "Completing"
event = "deadline_after_claim"
to = "Completing"
owner = "CancellationOwner"
linearization = "the already claimed response wins the deadline race and continues bounded delivery"
outcome = "response-claim-won"
retryability = "join-existing"

[[machine.transition]]
from = "Completing"
event = "drain_after_claim"
to = "Completing"
owner = "Servient"
linearization = "drain joins the already claimed bounded response-delivery owner"
outcome = "response-delivery-owned"
retryability = "join-existing"

[[machine.transition]]
from = "Completing"
event = "drop_after_claim"
to = "Completing"
owner = "ResponseCoordinator"
linearization = "drop transfers or cancels the already claimed bounded delivery without reopening the response opportunity"
outcome = "response-delivery-owned"
retryability = "runtime-owned"

[[machine.transition]]
from = "Completing"
event = "release"
to = "Released"
owner = "ResponseCoordinator"
linearization = "retain the delivery terminal, then release response capacity and the generation exactly once"
outcome = "response-terminal-released"
retryability = "terminal"

[[machine.transition]]
from = "Cancelled"
event = "release"
to = "Released"
owner = "Servient"
linearization = "release cancelled response slot once without releasing handler execution ownership"
outcome = "response-opportunity-released-handler-may-remain"
retryability = "terminal"

