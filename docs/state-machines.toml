host_lane_limits = "host_emission_lanes_per_binding_max and host_emission_lanes_global_max; these are not applicable to the constrained runtime"
target_contract = "The coordinator consumes only generation-bearing publication targets from the committed exposure plan; it never scans a TD or constructs a target from a protocol label"
ordering_contract = "Each affordance sequence is assigned before side effects. Local and binding progress may overlap, but completion for one sequence is published only after every selected target is terminal."
result_contract = "One exact result cell exists for every admitted binding target. Local delivery retains exact aggregate accepted, rejected, and lost counts while the local cursor is live. Binding failures are never truncated, overwritten, or collapsed to one boolean."
payload_contract = "All local and binding targets borrow or share one admitted immutable payload lease; fan-out performs no per-target payload-byte copy"
callback_contract = "Subscriber delivery and binding publication calls execute outside engine locks and constrained critical sections; the closed dispatch-policy value invokes no application callback"
initial = "Reserved"
states = [
    "Reserved",
    "Ready",
    "Dispatching",
    "Cancelling",
    "Completing",
    "Completed",
    "Failed",
    "Cancelled",
    "Released",
]
terminal = ["Released"]
required_events = [
