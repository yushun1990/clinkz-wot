[gate_policy]
minimum_metrics_regress_when = "decrease"
maximum_metrics_regress_when = "increase"
integer_zero_budget = "exact"
characterization_requires_explicit_marker = true

[measurement]
latency_start = "target-cycle-counter-before-engine-operation"
latency_stop = "target-cycle-counter-after-result-or-terminal-status"
include_transport_io = false
include_codec = "workload-specific-and-recorded"
allocation_boundary = "clinkz-wot-engine-excluding-handler-owned-output"
peak_live_bytes_unit = "bytes"
work_budget_codec_unit = "exact-bytes"

[operation_boundary]
local_sync_interaction = "before public local call -> result returned"
inbound_dispatch_no_transport = "owned request ready -> owned response constructed"
compiled_plan_lookup = "lookup key ready -> generation-safe plan reference acquired"
candidate_selection_32 = "ordered candidates ready -> selection or terminal selection error"
security_selection_64_local_probes = "effective expression ready -> branch selected or terminal selection error"
composed_strict_interaction_1k = "owned input ready -> validated dispatch result returned"
subscription_round_trip_one_subscriber = "before enqueue -> same sample dequeued"
shared_payload_fanout_256 = "before sequence assignment -> every enqueue or overflow decision committed"
bounded_fanout_progress_256 = "before one runtime step -> step returns at work boundary"
lazy_plan_single_flight = "first waiter publishes compile intent -> all interleaved waiters observe result or backpressure"
interaction_accounting = "before admitted interaction accounting -> local counters and reservations committed"
manual_step_fairness = "before runtime step -> step returns at work boundary"
profile_maximum_td_planning = "source bytes admitted -> private compiled plan complete before publication"
admission_byte_and_structure_scaling = "source bytes admitted -> private admission result or limit error"
handler_storage_replacement_matrix = "before handler registration, replacement, removal, or clear -> slot generation published or every reservation rolled back"
handler_cancellation_reentrancy = "selected handler and input owned -> terminal result delivered or discarded and retained invocation ownership released within bounded steps"
producer_subscription_transaction = "before subscription admission -> the declared matrix cell reaches Active or its retained terminal outcome within declared work and drain budgets; teardown and replay cells continue through every response and cleanup acknowledgement plus the declared eviction or stale-replay observation"
emission_binding_bounded_progress = "fully admitted emission and caller-owned slots ready -> one runtime step returns at its work boundary with retained binding cursor progress"
native_collection_subscription = "root collection plan, caller-owned driver slot, and reserved SubscriptionId ready -> one binding driver is installed or a terminal start error is retained"
typed_binding_slots_and_input_rejection = "caller-owned typed binding slots and owned delivery input ready -> each operation retains generation-safe state or rejects before acceptance with the complete input returned"
compiled_plan_set_lifecycle = "logical plans, binding compiler snapshot, caller-owned artifact slots, and reserved footprint ready -> bounded steps publish, pin, drain, and reclaim one immutable plan set"
route_guard_readiness_lifecycle = "admitted route plans, typed route slots, and complete static registration ready -> bounded steps retain every guard through readiness, serving, or terminal cleanup"
bounded_binding_ingress = "caller-owned ingress capacity and route slot ready -> bounded steps commit item and byte saturation decisions while unrelated routes retain progress"

