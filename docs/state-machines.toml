shutdown_contract = "Drain closes new claims before either route becomes observably Draining. A claimed poll joins through DrainingClaimed, and the complete committed-closed guard transfers to route shutdown only after this driver reaches Released."
terminal_contract = "OperationalError is nonterminal. RouteTerminal is retained at most once, closes later acceptance only for this route generation, and requires acknowledgement before release."
