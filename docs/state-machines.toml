requirements = ["PLAN-ARTIFACT-001", "PLAN-SET-001"]
visibility = "cross-crate-servient-contract"
transition_contract = "exact"
owner_record = "Servient CompiledPlanSetRecord"
scope = "Owns one produced or consumed handle generation's build cursor, immutable set material, accounting ledger, publication identity, pins, operation leases, lazy slots, reclaim cursor, and terminal disposition"
publication_contract = "Frozen material becomes selectable only through publish_consumer or publish_producer; each event is atomic with the corresponding complete registry publication"
pin_contract = "Pins and operation leases may be acquired only from Published. begin_drain closes both acquisition gates before Draining is observable, while pre-existing generation-checked leases remain valid until release."
failed_disposition_contract = "Failed is unpublished. PlanSetReclaimOwner releases provisional or frozen plan and artifact storage incrementally only after every Producer route rollback owner is terminal; a bounded diagnostic may outlive the material."
reclaimed_disposition_contract = "Reclaimed owns no plan, artifact, lazy-slot, cursor, route, cleanup, pin, or operation bytes for the generation"
