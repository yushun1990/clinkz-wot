retryability = "not-applicable"

[[machine.transition]]
from = "Committing"
event = "publish"
to = "Serving"
owner = "Servient"
linearization = "registry generation becomes serving"
outcome = "published"
retryability = "not-applicable"

[[machine.transition]]
from = "Preparing"
event = "cancel"
to = "Cancelling"
owner = "Servient"
linearization = "cancel wins lifecycle publication boundary"
