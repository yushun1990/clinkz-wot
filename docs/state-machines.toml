[[machine.transition]]
from = "Starting"
event = "start_error"
to = "Closed"
owner = "SubscriptionStartOwner"
linearization = "retain ProcessTerminal::Failed and Complete cleanup after proving that no driver or remote resource escaped, then return the cloned start error without publishing a facade"
