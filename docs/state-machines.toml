retryability = "not-applicable"

[[machine.transition]]
from = "Ready"
event = "cancel"
to = "Cancelled"
owner = "EmissionCoordinator"
linearization = "record cancellation before any admitted target starts"
outcome = "cancelled-before-side-effects"
retryability = "terminal"

[[machine.transition]]
from = "Ready"
event = "drop"
