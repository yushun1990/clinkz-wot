[[machine.transition]]
from = "CleanupPending"
event = "cleanup_progress"
to = "CleanupPending"
owner = "SubscriptionCleanupOwner"
linearization = "commit one bounded generation-matching cleanup step, retain the driver cursor, and preserve the retained ProcessTerminal unchanged"
outcome = "PendingCleanup"
retryability = "recorded-per-step"

[[machine.transition]]
from = "CleanupPending"
event = "cleanup_complete"
to = "Closed"
owner = "SubscriptionCleanupOwner"
linearization = "the final retained stop operation completes, preserves the retained ProcessTerminal unchanged, and releases the driver outside locks"
outcome = "Complete"
retryability = "terminal"

[[machine.transition]]
from = "CleanupPending"
event = "residual"
to = "Failed"
owner = "SubscriptionCleanupOwner"
linearization = "the retained stop operation becomes a durable structured residual while preserving the retained ProcessTerminal unchanged"
outcome = "ResidualExternalState"
retryability = "recorded"

[[machine.transition]]
from = "Closed"
event = "release"
to = "Released"
owner = "SubscriptionRegistry"
linearization = "all facade, control, status, and cleanup views acknowledge the terminal generation"
outcome = "released"
retryability = "terminal"

[[machine.transition]]
from = "Failed"
event = "release"
to = "Released"
owner = "SubscriptionRegistry"
linearization = "all facade, control, status, and cleanup views acknowledge the retained failure"
outcome = "released"
retryability = "terminal"

[[machine]]
id = "subscription-driver-slot"
requirements = [
    "BIND-PROGRESS-001",
    "CONCUR-LIN-001",
    "HANDLE-DROP-001",
    "STATE-SUB-001",
]
visibility = "crate-private-servient-or-caller-owned-constrained-slot"
transition_contract = "exact"
scope = "Owns the unique receive/stop access lease for one binding-owned HostSubscriptionDriver or caller-owned constrained driver state"
claim_contract = "Every receive and stop callback uses a fresh nonce. Callback completion commits only when SubscriptionId, subscription generation, binding generation, state, and nonce still match."
critical_section_contract = "Driver callbacks and driver destruction execute outside engine locks and constrained critical sections"
stop_input_contract = "StopStarting owns the unchanged driver or typed slot plus one complete SubscriptionStopInput until start_stop accepts its exact request and CleanupPhaseContext. Explicit pre-acceptance rejection returns both unchanged; implicit rejection retains both through durable residual recording; Pending commits the full input to StopClaimed."
terminal_contract = "SubscriptionDriverEvent transfers terminal reason and SubscriptionDriverCleanupDisposition together. The slot classifies driver and cleanup ownership, not the ProcessTerminal cause: Complete retires the driver into Closed even when the retained terminal is Failed, TransferRequired retains the complete driver or typed slot until acknowledged transfer, and ResidualExternalState records it. A borrowed callback never returns PendingCleanup."
cleanup_slot_projection = ["Complete->Closed", "PendingCleanup->CleanupPending", "ResidualExternalState->Residual"]
callback_terminal_precedence = "claimed-driver-terminal-wins"
retryable_rejection_intent = "RetryableExplicit"
implicit_invalid_outcome = "ResidualExternalState"
initial = "Vacant"
states = [
