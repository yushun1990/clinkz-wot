[[machine]]
id = "producer-subscription"
requirements = [
    "CONCUR-LIN-001",
    "CONCUR-USER-001",
    "HANDLER-CANCEL-001",
    "HANDLER-SUB-001",
    "HANDLER-STORAGE-001",
]
visibility = "crate-private"
transition_contract = "exact"
owner_record = "ProducerSubscriptionOwner"
cleanup_record = "HandlerCleanupOwner"
callback_lease = "CallbackLease"
scope = "Owns one reserved SubscriptionId, local guard slot, setup call capacity, selected setup entry, retained teardown generation plus footprint metadata, acceptance, installation, active publication, rollback, and retained terminal outcome"
cancellation_causes = ["Manual", "Deadline", "Drain", "Drop"]
first_cause_semantics = "The first cause committed against the subscription generation and active callback nonce is immutable; cleanup errors are retained separately and never overwrite it"
paired_teardown_semantics = "Admission fails before application setup unless a required paired teardown generation exists and its declared footprint can individually fit the configured limits; it does not reserve teardown pending-call count or bytes while active; acceptance creates exactly one teardown obligation owned until completion, transfer, or residual recording"
terminal_replay_semantics = "Closed and Failed retain one bounded payload-free terminal outcome; repeated stop, teardown, cancellation, and drop observers join the same generation through separately charged in-flight response views and never invoke application teardown again"
terminal_retention_semantics = "Closed and Failed become evictable only after every terminal release precondition holds. Quiescence does not immediately release the record; deterministic admission-pressure or Thing-destruction eviction invokes release_when_quiescent."
setup_handoff_semantics = "Reserved owns the setup entry and one setup pending-call reservation plus the teardown generation and footprint metadata; begin_accept atomically transfers only the setup entry and setup reservation to a HandlerCallOwner whose fixed sink is ProducerAcceptance"
acceptance_handoff_semantics = "transfer_start_result returns the setup reservation exactly once and transfers Ok to accepted or Err to handler_error; transfer_late_start_result transfers Ok to accepted_late or Err to error_late before HandlerCallOwner releases"
teardown_handoff_semantics = "Active-to-Stopping transfers only teardown responsibility and retained generation metadata; when ApplicationTeardown becomes runnable, HandlerCleanupOwner acquires a normal pending-call count and byte reservation atomically with creation of at most one ProducerTeardown HandlerCallOwner; saturation leaves the bit Pending and reports ProducerSubscriptionTeardown pending work"
teardown_response_semantics = "Only the wire request that wins Active-to-Stopping may receive the validated paired-handler InteractionOutput; concurrent joiners and later wire teardown requests receive the retained payload-free terminal summary, and every view owns a separately admitted InFlight response opportunity"
teardown_wait_budget_semantics = "The first failed ApplicationTeardown admission starts one cumulative wait. Host progress stops at handler_drain_timeout_millis_max and manual-poll progress charges one HandlerSteps unit per failed admission and stops at handler_drain_steps_max. Zero selects immediate fallback. At the first applicable bound, no further normal admission is attempted: the owner must charge cleanup transfer or commit its already reserved Producer residual record."
resource_ledger_semantics = "One subscriptions item reservation jointly bounds SubscriptionId, ProducerSubscriptionOwner, and the embedded local guard slot; their measured bytes are charged to handler state. One independent Producer residual record token and its byte maximum are reserved before setup."
setup_cancellation_obligation_semantics = "SetupCancellation is Absent for sync and async Producer starts. A bounded-step start changes it from Absent to Pending when cancellation first owns typed setup state, to Claimed(callback_nonce) only while cancel executes, back to Pending after HandlerStep::Pending, to Complete after clean completion or a no-state late result, to PendingCleanup after charged cleanup transfer, or to Residual only after durable Producer-residual commit. It never coexists as Pending or Claimed with a terminal Producer state."
reservation_accounting = [
    "subscription-slot:Reserved->Released",
    "producer-record-and-local-guard:embedded-in-subscription-slot-and-charged-to-handler-state->Released",
    "setup-call:Reserved->HandlerCallOwner->released-at-result",
    "subscription-bytes:provisional-at-Reserved->active-at-Accepted->released-at-no-acceptance-or-ApplicationTeardown-complete-or-residual",
    "teardown-generation:Reserved-metadata->ProducerSubscriptionOwner->released-at-terminal-or-residual",
    "teardown-call:unreserved-while-active->acquired-at-application-teardown-claim->HandlerCallOwner->released-at-result",
    "guard-slot:Reserved->installed-guard->closed-or-residual",
    "join-view:separate-InFlight-token->response-terminal",
    "cleanup-slot:uncharged-until-actual-transfer->HandlerCleanupOwner-or-residual",
    "producer-residual-token:reserved-before-setup->released-after-no-residual-or-committed-to-independent-ledger-until-reconciliation",
]
obligation_bits = ["SetupCancellation", "GuardClose", "ApplicationTeardown"]
obligation_states = [
    "Absent",
    "Pending",
    "Claimed(callback_nonce)",
    "Complete",
    "PendingCleanup(cleanup_handle)",
    "Residual(producer_residual_record)",
]
obligation_creation = "A bounded-step cancellation that owns typed pre-acceptance setup state changes SetupCancellation from Absent to Pending; acceptance changes ApplicationTeardown from Absent to Pending; complete guard installation changes GuardClose from Absent to Pending; reservation alone creates no obligation"
cleanup_order = ["SetupCancellation", "GuardClose", "ApplicationTeardown"]
cleanup_claim_semantics = "Under the subscription boundary, claim_next_obligation selects the first Pending or progressable PendingCleanup bit in cleanup_order. SetupCancellation moves its retained typed setup state to a budgeted cancel CallbackLease without a new pending-call charge; GuardClose moves its guard directly to Claimed; ApplicationTeardown first acquires normal pending-call count and bytes and creates its ProducerTeardown HandlerCallOwner atomically. Saturation leaves ApplicationTeardown Pending and publishes ProducerSubscriptionTeardown pending work; every successful claim uses a fresh nonce and commits only that nonce."
cleanup_partial_semantics = "Each later bit is attempted after the earlier callback returns Complete, error, PendingCleanup, or Residual; an earlier failure never skips a later bit; terminal transitions require that no bit is Pending or Claimed"
teardown_error_semantics = "A paired teardown Err is terminal only when the application asserts no retryable obligation remains; otherwise the engine durably records ResidualExternalState before releasing the selected generation"
residual_record_semantics = "At most one fixed Producer residual record covers all three obligation bits. It contains only subscription and Thing slot generations, a three-bit residual mask, first cause, bounded error disposition, optional binding generation, and checked cleanup attempts. The added mask bit changes no record-capacity limit. It uses the independently reserved Producer residual ledger, never cleanup_items_max or cleanup_bytes_max."
join_view_semantics = "The Producer record stores only a checked local-view count and terminal summary; Active:stop and nonterminal join_stop increment that count once, join_runtime_stop creates no view, and terminal join_stop has zero net count. Each joining wire request retains its own bounded InFlight token and correlation, so no unbounded waiter or response list is stored in the subscription."
terminal_release_preconditions = [
    "start-response-terminal",
    "all-teardown-response-views-terminal",
    "SetupCancellation-absent-or-complete-or-residual",
    "ApplicationTeardown-absent-or-complete-or-residual",
    "GuardClose-absent-or-complete-or-residual",
    "cleanup-owner-absent-or-acknowledged",
    "local-view-count-zero",
]
