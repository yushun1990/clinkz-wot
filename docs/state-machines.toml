generation_contract = "Thing slot, affordance, route, binding, plan, emission, and slot generations are checked at start and completion; stale work never publishes and stale completion cannot update a reused result cell"
lane_contract = "Host Queued slots belong to the selected binding's bounded lane. A full or slow lane cannot consume another binding's reserved lane or slot capacity. Constrained slots retain their own cursor and WorkBudget progress."
result_contract = "The terminal slot outcome transfers exactly once into its pre-reserved coordinator result cell before the slot releases"
critical_section_contract = "Binding start, poll, cancel, cleanup, and state destruction execute outside engine locks and constrained critical sections"
initial = "Reserved"
states = [
    "Reserved",
    "Queued",
    "Publishing",
    "Cancelling",
    "CleanupPending",
    "Succeeded",
    "Failed",
    "Cancelled",
    "Released",
]
terminal = ["Released"]
required_events = [
    "Reserved:enqueue_host",
    "Reserved:begin_constrained",
    "Reserved:stale_generation",
    "Reserved:cancel",
    "Reserved:drop",
    "Queued:begin_publish",
    "Queued:cancel",
    "Queued:drop",
    "Publishing:progress",
    "Publishing:succeed",
    "Publishing:fail",
    "Publishing:cancel",
    "Publishing:drop",
    "Cancelling:progress",
    "Cancelling:returned_success",
    "Cancelling:returned_failure",
    "Cancelling:complete",
    "Cancelling:cleanup_transfer",
    "Cancelling:residual",
    "CleanupPending:progress",
    "CleanupPending:returned_success",
    "CleanupPending:returned_failure",
    "CleanupPending:complete",
    "CleanupPending:residual",
    "Succeeded:release",
    "Failed:release",
    "Cancelled:release",
]

[[machine.transition]]
from = "Reserved"
event = "enqueue_host"
to = "Queued"
owner = "EmissionDispatchPolicy"
linearization = "publish the slot in the selected binding's already reserved host lane"
outcome = "queued"
retryability = "not-applicable"

[[machine.transition]]
from = "Reserved"
event = "begin_constrained"
to = "Publishing"
owner = "BindingEmissionOwner"
linearization = "claim the caller-owned slot for the selected binding generation"
outcome = "in-progress"
retryability = "not-applicable"

[[machine.transition]]
from = "Reserved"
event = "stale_generation"
to = "Failed"
owner = "BindingEmissionOwner"
linearization = "commit StaleHandle before any binding callback"
outcome = "StaleHandle"
retryability = "terminal"

[[machine.transition]]
from = "Reserved"
event = "cancel"
to = "Cancelled"
owner = "BindingEmissionOwner"
linearization = "record cancellation before the binding observes the publication"
outcome = "Cancelled"
retryability = "terminal"

[[machine.transition]]
from = "Reserved"
event = "drop"
to = "Cancelled"
owner = "BindingEmissionOwner"
linearization = "runtime cancellation releases an unstarted slot"
outcome = "Cancelled"
retryability = "terminal"

[[machine.transition]]
from = "Queued"
event = "begin_publish"
to = "Publishing"
owner = "BindingEmissionOwner"
linearization = "remove the slot from its binding lane and start the matching publication outside lane locks"
outcome = "in-progress"
retryability = "not-applicable"

[[machine.transition]]
from = "Queued"
event = "cancel"
to = "Cancelled"
owner = "EmissionDispatchPolicy"
linearization = "remove the unstarted slot from its binding lane and commit cancellation"
outcome = "Cancelled"
retryability = "terminal"

[[machine.transition]]
from = "Queued"
event = "drop"
to = "Cancelled"
owner = "EmissionDispatchPolicy"
linearization = "runtime cancellation removes the unstarted slot from its binding lane"
outcome = "Cancelled"
retryability = "terminal"

[[machine.transition]]
from = "Publishing"
event = "progress"
to = "Publishing"
owner = "BindingEmissionOwner"
linearization = "commit bounded binding-local progress and retain its exact cursor"
outcome = "pending"
retryability = "retained-cursor"

[[machine.transition]]
from = "Publishing"
event = "succeed"
to = "Succeeded"
owner = "BindingEmissionOwner"
linearization = "commit the generation-matching success into the pre-reserved result cell"
outcome = "Complete"
retryability = "terminal"

[[machine.transition]]
from = "Publishing"
event = "fail"
to = "Failed"
owner = "BindingEmissionOwner"
linearization = "commit the complete binding error into the pre-reserved result cell"
outcome = "Failed"
retryability = "terminal"

[[machine.transition]]
from = "Publishing"
event = "cancel"
to = "Cancelling"
owner = "BindingEmissionOwner"
linearization = "record cancellation against the running binding progress generation"
outcome = "cancelling"
retryability = "join-existing"

[[machine.transition]]
from = "Publishing"
event = "drop"
to = "Cancelling"
owner = "BindingEmissionOwner"
linearization = "transfer the running slot to bounded runtime cancellation ownership"
outcome = "runtime-cancelling"
retryability = "runtime-owned"

[[machine.transition]]
from = "Cancelling"
event = "progress"
to = "Cancelling"
owner = "BindingEmissionOwner"
linearization = "commit bounded binding cancellation without restarting its cursor"
outcome = "pending"
retryability = "retained-cursor"

[[machine.transition]]
from = "Cancelling"
event = "returned_success"
to = "Succeeded"
owner = "BindingEmissionOwner"
linearization = "commit the late generation-matching BindingPublication into the pre-reserved result cell without reopening the emission caller"
outcome = "CompleteLate"
retryability = "terminal"

[[machine.transition]]
from = "Cancelling"
event = "returned_failure"
to = "Failed"
owner = "BindingEmissionOwner"
linearization = "commit the late atomic publication error into the pre-reserved result cell without restarting publication"
outcome = "FailedLate"
retryability = "terminal"

[[machine.transition]]
from = "Cancelling"
event = "complete"
to = "Cancelled"
owner = "BindingEmissionOwner"
linearization = "binding cancellation completes and the cancellation result cell is committed"
outcome = "Cancelled"
retryability = "terminal"

[[machine.transition]]
from = "Cancelling"
event = "cleanup_transfer"
to = "CleanupPending"
owner = "BindingEmissionCleanupOwner"
linearization = "move binding state and cursor into an already reserved bounded cleanup record"
outcome = "PendingCleanup"
retryability = "recorded"

[[machine.transition]]
from = "Cancelling"
event = "residual"
to = "Failed"
owner = "BindingEmissionOwner"
linearization = "durably record unmatched binding state and commit the residual result"
outcome = "ResidualExternalState"
retryability = "recorded"

[[machine.transition]]
from = "CleanupPending"
event = "progress"
to = "CleanupPending"
owner = "BindingEmissionCleanupOwner"
linearization = "commit one bounded cleanup step and retain the binding cursor"
outcome = "PendingCleanup"
retryability = "recorded-per-step"

[[machine.transition]]
from = "CleanupPending"
event = "returned_success"
to = "Succeeded"
owner = "BindingEmissionCleanupOwner"
linearization = "commit the late generation-matching BindingPublication and acknowledge its transferred cleanup handle"
outcome = "CompleteLate"
retryability = "terminal"

[[machine.transition]]
from = "CleanupPending"
event = "returned_failure"
to = "Failed"
owner = "BindingEmissionCleanupOwner"
linearization = "commit the late atomic publication error and acknowledge its transferred cleanup handle"
outcome = "FailedLate"
retryability = "terminal"

[[machine.transition]]
from = "CleanupPending"
event = "complete"
to = "Cancelled"
owner = "BindingEmissionCleanupOwner"
linearization = "the final retained cleanup operation completes and commits cancellation"
outcome = "Cancelled"
retryability = "terminal"

[[machine.transition]]
from = "CleanupPending"
event = "residual"
to = "Failed"
owner = "BindingEmissionCleanupOwner"
linearization = "the retained binding obligation becomes a durable structured residual"
outcome = "ResidualExternalState"
retryability = "recorded"

[[machine.transition]]
from = "Succeeded"
event = "release"
to = "Released"
owner = "EmissionCoordinator"
linearization = "the coordinator acknowledges the transferred result and releases slot and lane capacity"
outcome = "released"
retryability = "terminal"

[[machine.transition]]
from = "Failed"
event = "release"
to = "Released"
owner = "EmissionCoordinator"
linearization = "the coordinator acknowledges the transferred error and releases slot and lane capacity"
outcome = "released"
retryability = "terminal"

[[machine.transition]]
from = "Cancelled"
event = "release"
to = "Released"
owner = "EmissionCoordinator"
linearization = "the coordinator acknowledges cancellation after cleanup ownership settles"
outcome = "released"
retryability = "terminal"

