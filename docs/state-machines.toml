event = "begin_accept"
to = "Accepting"
owner = "ProducerSubscriptionOwner"
linearization = "transfer the setup entry and reservation to one ProducerAcceptance HandlerCallOwner, publish Accepting and its nonce, then grant the callback lease outside locks"
outcome = "application-setup-running"
retryability = "not-applicable"

[[machine.transition]]
from = "Reserved"
event = "cancel"
to = "Closed"
owner = "CancellationOwner"
linearization = "cancellation wins before application setup"
outcome = "Cancelled-without-setup"
retryability = "terminal-recorded"

[[machine.transition]]
from = "Reserved"
event = "drop"
to = "Closed"
owner = "CancellationOwner"
linearization = "drop requests cancellation before application setup"
outcome = "Cancelled-without-setup"
retryability = "runtime-owned"

[[machine.transition]]
from = "Reserved"
event = "deadline"
to = "Closed"
owner = "CancellationOwner"
linearization = "deadline wins before application setup"
outcome = "TimedOut-without-setup"
retryability = "terminal-recorded"

[[machine.transition]]
from = "Accepting"
event = "accepted"
to = "Accepted"
owner = "ProducerSubscriptionOwner"
linearization = "consume the transferred acceptance, settle the setup-call reservation, and create exactly one paired teardown obligation"
outcome = "acceptance-retained-not-published"
retryability = "not-applicable"

[[machine.transition]]
from = "Accepting"
event = "handler_error"
to = "Failed"
owner = "ProducerSubscriptionOwner"
linearization = "as part of producer-start-error-response, consume the transferred setup error, settle setup-call capacity, claim its InFlight response, and retain failure before any teardown obligation exists"
outcome = "setup-failed-error-response-claimed"
retryability = "terminal-recorded"

[[machine.transition]]
from = "Accepting"
event = "handler_error_response_unavailable"
to = "Failed"
owner = "ProducerSubscriptionOwner"
linearization = "consume the transferred setup error, settle setup-call capacity, and record that the matching InFlight response was already closed or terminal before marking the start response terminal"
outcome = "setup-failed-response-unavailable"
retryability = "terminal-recorded"

[[machine.transition]]
from = "Accepting"
event = "cancel"
to = "AcceptingCancelled"
owner = "CancellationOwner"
linearization = "record the first cause against the setup call nonce while its unique CallbackLease remains outside locks; a bounded-step start that owns typed setup state also creates SetupCancellation=Pending"
outcome = "setup-running-acceptance-will-be-late"
retryability = "join-existing"

[[machine.transition]]
from = "Accepting"
event = "drop"
to = "AcceptingCancelled"
owner = "CancellationOwner"
linearization = "record Drop against the setup call nonce while its unique CallbackLease remains outside locks; a bounded-step start that owns typed setup state also creates SetupCancellation=Pending"
outcome = "setup-running-acceptance-will-be-late"
retryability = "runtime-owned"

[[machine.transition]]
from = "Accepting"
event = "deadline"
to = "AcceptingCancelled"
owner = "CancellationOwner"
linearization = "record Deadline against the setup call nonce while its unique CallbackLease remains outside locks; a bounded-step start that owns typed setup state also creates SetupCancellation=Pending"
outcome = "setup-running-acceptance-will-be-late"
retryability = "join-existing"

[[machine.transition]]
from = "AcceptingCancelled"
event = "accepted_late"
to = "RollingBack"
owner = "ProducerSubscriptionOwner"
linearization = "consume the transferred late acceptance, commit any pending SetupCancellation as Complete because typed setup state returned as the acceptance, create exactly one ApplicationTeardown obligation, and immediately transfer it to rollback"
outcome = "rollback-required"
retryability = "not-applicable"

[[machine.transition]]
from = "AcceptingCancelled"
event = "error_late"
to = "Closed"
owner = "ProducerSubscriptionOwner"
linearization = "consume the transferred late setup error, commit any pending SetupCancellation as Complete under the no-obligation-on-error contract, and settle the setup reservation because cancellation or deadline already closed publication"
outcome = "cancelled-or-timed-out-without-obligation"
retryability = "terminal-recorded"

[[machine.transition]]
from = "AcceptingCancelled"
event = "setup_cancel_created"
to = "AcceptingCancelled"
owner = "CallbackLease"
linearization = "a bounded start callback returns typed state after cancellation, atomically changes SetupCancellation from Absent to Pending, and transfers that state to explicit cancellation ownership"
outcome = "setup-cancellation-required"
retryability = "not-applicable"

[[machine.transition]]
from = "AcceptingCancelled"
event = "setup_cancel_claim"
to = "AcceptingCancelled"
owner = "CallbackLease"
linearization = "change SetupCancellation from Pending to Claimed with the same fresh nonce used by handler-step-execution begin_cancel before invoking the budgeted cancel callback outside locks"
outcome = "setup-cancellation-callback-leased"
retryability = "not-applicable"

[[machine.transition]]
from = "AcceptingCancelled"
event = "setup_cancel_pending"
to = "AcceptingCancelled"
owner = "CallbackLease"
linearization = "a matching bounded cancel Pending return changes SetupCancellation from Claimed back to Pending and releases the callback lease"
outcome = "setup-cancellation-pending"
retryability = "step-again-with-budget"

[[machine.transition]]
from = "AcceptingCancelled"
event = "setup_aborted"
to = "Closed"
owner = "ProducerSubscriptionOwner"
linearization = "an incomplete async setup future was dropped with SetupCancellation Absent, or bounded-step cancellation commits SetupCancellation from Claimed to Complete, with no acceptance and no external obligation"
outcome = "cancelled-or-timed-out-without-obligation"
retryability = "terminal-recorded"

[[machine.transition]]
from = "AcceptingCancelled"
event = "setup_cleanup_pending"
to = "CleanupPending"
owner = "HandlerCleanupOwner"
linearization = "zero-step or expired host drain atomically charges cleanup capacity, transfers typed setup state and its byte reservation, and changes SetupCancellation from Pending or Claimed to PendingCleanup with intended terminal Closed"
outcome = "PendingCleanup"
retryability = "recorded-per-item"

[[machine.transition]]
from = "AcceptingCancelled"
event = "setup_cleanup_failed"
to = "Failed"
owner = "HandlerCleanupOwner"
linearization = "bounded-step setup cancellation returns a terminal error, commits SetupCancellation from Claimed to Complete, and asserts that no retryable or external obligation remains"
outcome = "setup-cancellation-failed-without-residual"
retryability = "terminal-recorded"

[[machine.transition]]
from = "AcceptingCancelled"
event = "setup_residual"
to = "Failed"
owner = "HandlerCleanupOwner"
linearization = "change SetupCancellation from Pending or Claimed to Residual in the transaction's reserved three-bit Producer record before dropping or releasing the last typed setup owner"
outcome = "ResidualExternalState"
retryability = "recorded"

[[machine.transition]]
from = "Accepted"
event = "response_invalid"
to = "RollingBack"
owner = "ProducerSubscriptionOwner"
linearization = "atomically claim the validation error response through complete_producer_start_error before transferring the teardown obligation to rollback"
outcome = "rollback-required-validation-response-claimed"
retryability = "not-applicable"

[[machine.transition]]
from = "Accepted"
event = "response_invalid_response_unavailable"
to = "RollingBack"
owner = "ProducerSubscriptionOwner"
linearization = "record that the matching response is already closed or terminal before transferring the teardown obligation to rollback"
outcome = "rollback-required-validation-response-unavailable"
retryability = "not-applicable"

[[machine.transition]]
from = "Accepted"
event = "begin_install"
to = "Installing"
owner = "ProducerSubscriptionOwner"
linearization = "publish the installation nonce, move the installer into one CallbackLease, and retain acceptance plus teardown obligation"
outcome = "guard-installation-running"
retryability = "not-applicable"

[[machine.transition]]
from = "Accepted"
event = "cancel"
to = "RollingBack"
owner = "CancellationOwner"
linearization = "cancellation wins before installation and transfers the teardown obligation to rollback"
outcome = "rollback-required-for-cancel"
retryability = "join-existing"

[[machine.transition]]
