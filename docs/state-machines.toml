visibility = "cross-crate-contract"
transition_contract = "exact"
owner_record = "Servient SubscriptionRecord"
scope = "Owns one engine-assigned SubscriptionId, admitted source and item/byte capacity, the binding start transaction, driver installation, the single public receive cursor, stop ownership, cleanup transfer, and the retained terminal outcome"
driver_contract = "The selected binding returns one HostSubscriptionDriver or fills one caller-owned constrained slot only after start succeeds; the binding never allocates the engine SubscriptionId"
source_contract = "Every SubscriptionItem carries the matching SubscriptionId and exact AffordanceTarget; collection start is rejected before side effects when the selected plan cannot guarantee exact source attribution"
receive_contract = "Only the non-Clone Servient Subscription facade owns the receive lease. Control and status views cannot poll items and never create another receive cursor."
installation_contract = "The driver moves BindingStartOwner -> SubscriptionInstallOwner -> SubscriptionDriverSlot exactly once. Active publication and driver-slot publication are one non-callback boundary."
stop_contract = "Stop, drop, remote terminal, and Servient drain join one generation-checked stop owner. start_stop accepts one exact request before poll_stop progress; both execute outside engine locks or constrained critical sections and neither is concurrent with poll_item on the same driver."
terminal_contract = "SubscriptionDriverEvent transfers the ProcessTerminal and CleanupOutcome together. SubscriptionState reports resource lifecycle independently from ProcessTerminal: Complete moves to Closed even when the retained terminal is Failed, PendingCleanup moves to CleanupPending after atomic transfer, and ResidualExternalState moves to Failed after durable recording. A no-driver start failure retains Failed plus Complete in its private record and closes without publishing a facade. Unrecorded cleanup remains pending."
process_terminal_axis = ["Completed", "Cancelled", "TimedOut", "Overflowed", "Domain", "Failed"]
cleanup_state_projection = ["Complete->Closed", "PendingCleanup->CleanupPending", "ResidualExternalState->Failed"]
failed_state_cause = "ResidualExternalState"
