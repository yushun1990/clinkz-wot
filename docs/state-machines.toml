    "StopRequested:callback_nonterminal",
    "StopRequested:callback_terminal_complete",
    "StopRequested:callback_terminal_transfer_required",
    "StopRequested:callback_terminal_residual",
    "StopStarting:explicit_start_rejected",
    "StopStarting:implicit_start_invalid",
    "StopStarting:start_pending",
    "StopStarting:start_complete",
    "StopStarting:transfer_required",
    "StopStarting:residual",
    "StopClaimed:poll_pending",
    "StopClaimed:complete",
    "StopClaimed:transfer_required",
    "StopClaimed:residual",
    "TransferRequired:transfer_accepted",
