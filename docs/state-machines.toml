[[machine]]
id = "serving-activation-authority"
requirements = [
    "BIND-PROGRESS-001",
    "BIND-ROUTE-001",
    "LIFE-EXPOSE-002",
    "PLAN-SET-001",
    "STATE-BIND-001",
]
visibility = "cross-crate-servient-contract"
transition_contract = "exact"
owner_record = "Servient ServingActivationRecord"
scope = "Privately owns one immutable public ServingActivationAuthority identity value plus the mutable Reserved, Serving, or Draining publication state for its Thing, produced generation, and Producer plan-set generation; terminal Cancelled or Reclaimed state owns no permit-issuance capability"
authority_contract = "ServingActivationAuthority contains only immutable public Thing, produced-generation, and plan-set-generation identity. claim_route exclusively borrows a matching RouteAcceptLease and returns a RouteAcceptClaim whose consuming into_permit operation is the only permit constructor; the private ServingActivationRecord owns all mutable publication and drain state and owns no binding state, route list, queue, or application dispatch capability."
publication_contract = "Reserved is admitted but unavailable. publish is the same Servient transition that publishes the Producer plan set, produced registry generation, and complete committed route set."
permit_contract = "claim_route is legal only after exact Thing, produced, plan-set, binding, and route generation validation plus transfer of that route's unique RouteAcceptLease to the claimed call owner. RouteAcceptClaim exclusively borrows that lease and authority; consuming the claim produces the non-Clone, non-Copy permit borrowed for one poll_accept call, and none can enter retained state."
drain_contract = "begin_drain closes new route-claim issuance before Draining is observable. A previously claimed accept poll may finish under its retained route and plan leases; no later claim succeeds."
resource_contract = "One authority is embedded in each admitted Producer plan-set runtime record and charged to plan_sets_* plus compiled_runtime_bytes_*. A permit retains zero bytes. Route claims use binding_routes_*, route_guard_bytes_*, and binding_wake_leases_global_max; closed ingress uses only binding_ingress_items_* and binding_ingress_bytes_*."
initial = "Reserved"
states = ["Reserved", "Serving", "Draining", "Cancelled", "Reclaimed"]
terminal = ["Cancelled", "Reclaimed"]
required_events = [
    "Reserved:publish",
    "Reserved:cancel",
    "Serving:claim_route",
    "Serving:reject_route_claim",
    "Serving:begin_drain",
    "Draining:release_claim",
    "Draining:reclaim_complete",
]

[[machine.transition]]
from = "Reserved"
event = "publish"
to = "Serving"
owner = "ServientServingActivationOwner"
linearization = "publish this authority with the immutable Producer plan set, produced registry generation, and every CommittedClosed route in one non-callback boundary"
outcome = "Serving-permit-claims-enabled"
retryability = "not-applicable"

[[machine.transition]]
from = "Reserved"
event = "cancel"
to = "Cancelled"
owner = "ServientServingActivationOwner"
linearization = "prevent publication and release the embedded authority only after unpublished route rollback ownership is retained"
outcome = "Cancelled-never-serving"
retryability = "terminal"

[[machine.transition]]
from = "Serving"
event = "claim_route"
to = "Serving"
owner = "RouteAcceptOwner"
linearization = "after the private record validates every generation and transfers the unique RouteAcceptLease to the claimed call owner, exclusively borrow that lease into RouteAcceptClaim and consume the claim into one scoped permit before invoking the binding"
outcome = "Borrowed-route-permit-after-claim-consume"
retryability = "retained-route-lease"

[[machine.transition]]
from = "Serving"
event = "reject_route_claim"
to = "Serving"
owner = "ServientServingActivationOwner"
linearization = "reject a stale, mismatched, duplicate, or unreserved claim without producing a RouteAcceptClaim, changing the exclusively borrowed RouteAcceptLease, constructing a permit, or changing binding state"
outcome = "Route-claim-rejected"
retryability = "caller-must-refresh"

[[machine.transition]]
from = "Serving"
event = "begin_drain"
to = "Draining"
owner = "ServientServingActivationOwner"
linearization = "close new permit issuance before the produced generation or any route becomes observably Draining"
outcome = "Draining-existing-claims-retained"
retryability = "join-existing"

[[machine.transition]]
from = "Draining"
event = "release_claim"
to = "Draining"
owner = "RouteAcceptOwner"
linearization = "release one generation-matching pre-drain accept lease after its poll returns without issuing a replacement permit"
outcome = "Draining-claim-released"
retryability = "join-existing"

[[machine.transition]]
from = "Draining"
event = "reclaim_complete"
to = "Reclaimed"
owner = "PlanSetReclaimOwner"
linearization = "verify every pre-drain accept claim and route/plan lease released before reclaiming the embedded authority with its plan-set runtime record"
outcome = "Reclaimed-zero-authority-bytes"
retryability = "terminal"

[[machine]]
