fixture_seed = 4601
warmup_seconds = 3
sample_count = 100
regression_tolerance_percent = 10
outlier_policy = "none-unless-predeclared-and-recorded"
failed_sample_policy = "record-and-fail-gate"

[runner_fingerprint]
class = "aws-c7i-metal-24xl-pinned-4c-linux-6.12-v1"
board = "aws-ec2-c7i.metal-24xl"
cpu_model = "intel-xeon-scalable-sapphire-rapids"
