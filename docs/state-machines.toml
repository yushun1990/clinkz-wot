[[machine.transition]]
from = "Stopping"
event = "poll_stop_pending"
to = "Stopping"
owner = "SubscriptionStopOwner"
linearization = "retain the same driver and bounded stop cursor after poll_stop returns Pending, preserving the retained ProcessTerminal unchanged"
